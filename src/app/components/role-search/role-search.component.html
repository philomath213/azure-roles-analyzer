<div class="search-container">
  <label for="role-search" class="visually-hidden">Search roles</label>
  <div class="search-input-wrapper">
    <svg
      class="search-icon"
      aria-hidden="true"
      xmlns="http://www.w3.org/2000/svg"
      viewBox="0 0 24 24"
      fill="none"
      stroke="currentColor"
      stroke-width="2"
    >
      <circle cx="11" cy="11" r="8" />
      <path d="m21 21-4.3-4.3" />
    </svg>
    <input
      type="search"
      id="role-search"
      class="search-input"
      placeholder="Search by name or description..."
      [value]="searchValue()"
      (input)="onSearchInput($event)"
      autocomplete="off"
    />
    @if (searchValue()) {
      <button
        type="button"
        class="clear-button"
        (click)="onClear()"
        aria-label="Clear search"
      >
        <svg
          aria-hidden="true"
          xmlns="http://www.w3.org/2000/svg"
          viewBox="0 0 24 24"
          fill="none"
          stroke="currentColor"
          stroke-width="2"
        >
          <path d="M18 6 6 18M6 6l12 12" />
        </svg>
      </button>
    }
  </div>
</div>
