<div class="uploader">
  <input
    #fileInput
    type="file"
    accept=".json"
    class="visually-hidden"
    aria-label="Choose a custom roles JSON file"
    (change)="onFileChange($event)"
  />

  <button type="button" class="upload-btn" (click)="fileInput.click()">
    <svg
      aria-hidden="true"
      xmlns="http://www.w3.org/2000/svg"
      viewBox="0 0 24 24"
      fill="none"
      stroke="currentColor"
      stroke-width="2"
    >
      <path d="M21 15v4a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2v-4" />
      <polyline points="17 8 12 3 7 8" />
      <line x1="12" y1="3" x2="12" y2="15" />
    </svg>
    Upload Roles
  </button>

  @if (hasUploaded()) {
    <span class="uploaded-badge" aria-live="polite">
      {{ uploadedCount() }} custom {{ uploadedCount() === 1 ? 'role' : 'roles' }}
      <button
        type="button"
        class="clear-btn"
        [attr.aria-label]="'Clear ' + uploadedCount() + ' uploaded ' + (uploadedCount() === 1 ? 'role' : 'roles')"
        (click)="onClear()"
      >
        <svg
          aria-hidden="true"
          xmlns="http://www.w3.org/2000/svg"
          viewBox="0 0 24 24"
          fill="none"
          stroke="currentColor"
          stroke-width="2"
        >
          <path d="M18 6 6 18M6 6l12 12" />
        </svg>
      </button>
    </span>
  }

  @if (uploadError()) {
    <p class="upload-error" role="alert">{{ uploadError() }}</p>
  }
</div>
